site_name: WATI Conductor Documentation
site_description: Documentation for the WATI Conductor project
site_author: QuantZach Team

docs_dir: ../docs
use_directory_urls: false

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Components: components.md
  - Status: status.md
  - Roadmap: roadmap.md
  - Setup: setup.md
  - Dev Notes: dev-notes.md
  - Specs:
    - Overview: specs/v1/README.md
    - Requirements: specs/v1/requirements.md
    - Design: specs/v1/design.md
    - Tasks: specs/v1/tasks.md
    - Summary: specs/v1/SUMMARY.md
